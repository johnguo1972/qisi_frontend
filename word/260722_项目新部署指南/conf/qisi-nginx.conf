# ============================================================
# Nginx 生产配置 - 齐思 · A自习室（v4.0）
#
# 域名: qisi.chengxuelu.com（一级域名，无子路径）
# 部署目录: /mnt/datadisk0/qisi/
# 后端端口: 0.0.0.0:8001（Gunicorn，通过 Docker 网关 172.18.0.1 访问宿主机）
# PG 版本: PostgreSQL 18.4（容器 app-pgsql）
# Redis 版本: 7.2（容器 qisi-redis）
#
# 部署路径: /opt/qisi/nginx.conf
# 证书路径: /etc/nginx/ssl/live/qisi.chengxuelu.com/
# ============================================================

events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;

    # Docker DNS resolver for dynamic container IPs
    resolver 127.0.0.11 valid=10s ipv6=off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ============================================================
    # HTTP 服务器块
    # 1. ACME challenge（Certbot 证书续期）—— 始终允许，不重定向
    # 2. 其他所有流量重定向到 HTTPS
    # ============================================================
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge —— 必须放在重定向之前
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 其他所有 HTTP 请求重定向到 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================================
    # HTTPS 服务器块
    # ============================================================
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL 证书（Let's Encrypt）
        ssl_certificate /etc/nginx/ssl/live/qisi.chengxuelu.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/qisi.chengxuelu.com/privkey.pem;

        # 安全 SSL 配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # OCSP Stapling（提升 HTTPS 握手性能）
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/nginx/ssl/live/qisi.chengxuelu.com/fullchain.pem;

        # 安全头
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;

        # 上传大小限制
        client_max_body_size 100m;

        # ============================================================
        # 前端 H5 静态页面（SPA 单页应用）
        # 容器内路径: /var/www/qisi-frontend-h5/
        # 宿主机映射: /mnt/datadisk0/qisi/frontend-h5/
        # 注意：使用 alias 而非 root，避免路径拼接错误
        # ============================================================
        location / {
            alias /var/www/qisi-frontend-h5/;
            index index.html;
            try_files $uri $uri/ /index.html;

            # HTML 不做缓存（确保每次更新后用户能拿到最新版本）
            location ~* \.html$ {
                expires -1;
                add_header Cache-Control "no-cache, must-revalidate";
            }

            # JS/CSS/图片等静态资源强缓存（文件名含 hash）
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        # ============================================================
        # 后端 API 代理（Django REST API）
        # 通过 Docker 网关 172.18.0.1 访问宿主机 8001 端口
        # Gunicorn 绑定 0.0.0.0:8001 保证 Docker 容器可达
        #
        # !!! 重要: proxy_pass 末尾必须带 /api/，不能省略 !!!
        # 如果写成 proxy_pass http://172.18.0.1:8001/;
        # Nginx 会剥离 /api/ 前缀，导致 Django 收到 /v1/xxx 而返回 404
        # ============================================================
        location /api/ {
            proxy_pass http://172.18.0.1:8001/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_read_timeout 120s;
            proxy_send_timeout 60s;
            client_max_body_size 100m;
        }

        # ============================================================
        # Django Admin 管理后台
        # 同样：proxy_pass 末尾必须带 /admin/
        # ============================================================
        location /admin/ {
            proxy_pass http://172.18.0.1:8001/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============================================================
        # Django 静态文件（collectstatic 产物）
        # 容器内路径: /var/www/qisi-static/
        # 宿主机映射: /mnt/datadisk0/qisi/backend/staticfiles/
        # ============================================================
        location /static/ {
            alias /var/www/qisi-static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ============================================================
        # 媒体文件（用户上传的试卷、图片等）
        # 容器内路径: /var/www/qisi-media/
        # 宿主机映射: /mnt/datadisk0/qisi/backend/media/
        # ============================================================
        location /media/ {
            alias /var/www/qisi-media/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ============================================================
        # 健康检查
        # ============================================================
        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # ============================================================
        # 日志
        # ============================================================
        access_log /var/log/nginx/access.log main;
        error_log /var/log/nginx/error.log warn;
    }
}