# 齐思 · A自习室 Nginx 站点配置
# 域名: qisi.chengxuelu.com/study
# 部署目录: /mnt/diskdata0/qisi
# 后端端口: 127.0.0.1:8000

# HTTP → HTTPS 强制跳转
server {
    listen 80;
    server_name qisi.chengxuelu.com;
    return 301 https://$host$request_uri;
}

# HTTPS 服务
server {
    listen 443 ssl http2;
    server_name qisi.chengxuelu.com;

    # ========== SSL 配置 ==========
    ssl_certificate /etc/letsencrypt/live/qisi.chengxuelu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qisi.chengxuelu.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ========== 安全头 ==========
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # ========== 后端 API 代理 ==========
    location /study/api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 100m;
    }

    # Django Admin 后台
    location /study/admin/ {
        proxy_pass http://127.0.0.1:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========== 静态文件 ==========
    # Django 静态文件（collectstatic 产物）
    location /study/static/ {
        alias /mnt/diskdata0/qisi/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 媒体文件（用户上传的试卷、图片等）
    location /study/media/ {
        alias /mnt/diskdata0/qisi/backend/media/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ========== 前端页面 ==========
    # H5 构建产物（SPA 单页应用）
    location /study/ {
        root /mnt/diskdata0/qisi/frontend-h5;
        index index.html;
        try_files $uri $uri/ /study/index.html;

        # HTML 不做缓存（确保每次更新后用户能拿到最新版本）
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # JS/CSS 等静态资源强缓存（文件名含 hash）
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ========== 日志 ==========
    access_log /mnt/diskdata0/qisi/logs/nginx-access.log;
    error_log /mnt/diskdata0/qisi/logs/nginx-error.log;
}