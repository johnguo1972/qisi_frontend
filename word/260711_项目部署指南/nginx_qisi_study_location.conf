# ============================================================
# 以下内容需添加到服务器上已有的 /opt/qisi/nginx.conf 中
# 在 HTTPS server 块（server { listen 443 ssl; ... }）内添加
# 位置：在 client_max_body_size 50M; 之后，已有项目路由之前
# 注意：容器内路径见下方注释，宿主机路径需通过 bind mount 映射
# ============================================================

    # ============================================================
    # 齐思 · A自习室 (qisi_frontend) — 部署在 /study 子路径
    # 后端监听 0.0.0.0:8001（通过 Docker 网关 172.18.0.1 访问宿主机）
    # 前端静态文件容器内路径: /var/www/qisi-frontend-h5/
    # 宿主机映射: /mnt/datadisk0/qisi/frontend-h5/
    # ============================================================

    # 前端 H5 静态页面（SPA 单页应用）
    # 注意：使用 alias 而非 root，避免路径拼接错误
    location /study/ {
        alias /var/www/qisi-frontend-h5/;
        index index.html;
        try_files $uri $uri/ /study/index.html;

        # HTML 不做缓存（确保每次更新后用户能拿到最新版本）
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # JS/CSS/图片等静态资源强缓存（文件名含 hash）
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # 后端 API 代理（Django REST API 通过 Docker 网关访问宿主机）
    location /study/api/ {
        proxy_pass http://172.18.0.1:8001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
        client_max_body_size 100m;
    }

    # Django Admin 管理后台
    location /study/admin/ {
        proxy_pass http://172.18.0.1:8001/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django 静态文件（collectstatic 产物）
    # 容器内路径: /var/www/qisi-static/
    # 宿主机映射: /mnt/datadisk0/qisi/backend/staticfiles/
    location /study/static/ {
        alias /var/www/qisi-static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 媒体文件（用户上传的试卷、图片等）
    # 容器内路径: /var/www/qisi-media/
    # 宿主机映射: /mnt/datadisk0/qisi/backend/media/
    location /study/media/ {
        alias /var/www/qisi-media/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }