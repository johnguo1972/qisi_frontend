# ============================================================
# Nginx 生产配置（Phase 2: 启用 HTTPS + Let's Encrypt 证书）
#
# qisi.chengxuelu.com 由 certbot-setup.sh 脚本替换
# 证书路径: /etc/nginx/ssl/live/{qisi.chengxuelu.com}/
# ============================================================

events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;

    # Docker DNS resolver for dynamic container IPs
    resolver 127.0.0.11 valid=10s ipv6=off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 上游服务
    upstream backapi {
        server qisi-backapi:3000;
    }

    upstream tiku {
        server tiku-web:8000;
    }

    # ============================================================
    # HTTP 服务器块：
    # 1. ACME challenge（Certbot 证书续期）—— 始终允许，不重定向
    # 2. 其他所有流量重定向到 HTTPS
    # ============================================================
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge —— 必须放在重定向之前
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 其他所有 HTTP 请求重定向到 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================================
    # HTTPS 主服务器块
    # ============================================================
    server {
        listen 443 ssl;
        server_name _;

        # SSL 证书（由 certbot 自动获取和续期）
        ssl_certificate /etc/nginx/ssl/live/qisi.chengxuelu.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/qisi.chengxuelu.com/privkey.pem;

        # 安全 SSL 配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        # OCSP Stapling（提升 HTTPS 握手性能）
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/nginx/ssl/live/qisi.chengxuelu.com/fullchain.pem;

        # HSTS（强制浏览器使用 HTTPS，启用前请确保证书有效）
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # 上传大小限制（图片上传可能较大）
        client_max_body_size 50M;
    # ============================================================
    # 齐思 · A自习室 (qisi_frontend) — 部署在 /study 子路径
    # ============================================================

    # 前端 H5 静态页面
    location /study/ {
        alias /var/www/qisi-frontend-h5/;
        index index.html;
        try_files $uri $uri/ /study/index.html;

        location ~* \.html$ {
            expires -1;
            add_header Cache-Control 'no-cache, must-revalidate';
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control 'public, immutable';
            access_log off;
        }
    }

    # 后端 API 代理
    location /study/api/ {
        proxy_pass http://172.18.0.1:8001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
        client_max_body_size 100m;
    }

    # Django Admin 管理后台
    location /study/admin/ {
        proxy_pass http://172.18.0.1:8001/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django 静态文件
    location /study/static/ {
        alias /var/www/qisi-static/;
        expires 30d;
        add_header Cache-Control 'public, immutable';
        access_log off;
    }

    # 媒体文件
    location /study/media/ {
        alias /var/www/qisi-media/;
        expires 7d;
        add_header Cache-Control 'public, immutable';
        access_log off;
    }


        # === tiku Django API endpoints (review, papers, knowledge) ===
        location /api/review/ {
            set $tiku_upstream http://tiku-web:8000;
            proxy_pass $tiku_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        location /api/papers/ {
            set $tiku_upstream http://tiku-web:8000;
            proxy_pass $tiku_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # === backapi (Next.js API) — catch-all for other /api/ routes ===
        location /api/ {
            set $backapi_upstream http://qisi-backapi:3000;
            proxy_pass $backapi_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
        }

        # === tiku (Django Web UI) — 默认路由，处理所有非 API 请求 ===
        location / {
            proxy_pass http://tiku/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # Django 管理后台（可选：限制 IP 访问）
        location /admin/ {
            proxy_pass http://tiku/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django 静态文件（Nginx 直接提供，不经过 Gunicorn）
        location /static/ {
            alias /var/www/tiku-static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Django 媒体文件（上传的图片等）
        location /media/ {
            alias /var/www/tiku-media/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # 健康检查
        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }
}
